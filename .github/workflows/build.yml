name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # Ignorăm verificarea de root complet
          export BUILDOZER_ALLOW_ROOT=1
          
          # Ștergem orice urmă de build anterior care ar putea fi coruptă
          buildozer clean
                  
          # Instalăm/actualizăm ce e strict necesar
          pip install --upgrade pip
          pip install setuptools
          
          # Rulăm buildozer direct
          yes y | buildozer -v android debug
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: scoalamaya-v2-apk
          path: bin/*.apk
