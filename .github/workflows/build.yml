name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git zip unzip openjdk-17-jdk

      - name: Clean old build
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          yes y | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mayainvata-apk
          path: bin/*.apk
