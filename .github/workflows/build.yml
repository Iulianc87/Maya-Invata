name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
      - name: Build
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          # Ștergem orice reziduu pentru a forța compilarea codului tău nou
          rm -rf .buildozer
          
          # Construim APK-ul pentru Maya Invata
          yes y | buildozer -v android debug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mayainvata-apk
          path: bin/*.apk
