name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          # Sarim peste 'buildozer clean' pentru ca da eroare
          # Rulăm direct build-ul
          yes y | buildozer -v android debug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: scoalamaya-v2-apk
          path: bin/*.apk
