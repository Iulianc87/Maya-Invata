name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          # Adăugăm parametrul --debug pentru a vedea eroarea reală
          # Și scoatem 'yes y' pentru a vedea dacă se blochează la o întrebare
          buildozer -v android debug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: scoalamaya-v2-apk
          path: bin/*.apk
